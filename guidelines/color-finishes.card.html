<!-- @dsCard group="Colors" viewport="700x160" name="Special Finishes" subtitle="Holographic, gold foil, silver coin overlays" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{padding:22px 24px;margin:0}
  .sw{display:flex;gap:16px;flex-wrap:wrap}
  .chip{width:180px;height:88px;border-radius:var(--r-md);display:flex;align-items:flex-end;padding:10px;box-shadow:var(--inset-line)}
  .name{font-family:var(--font-display);font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.1em;color:#10131c;text-shadow:0 1px 0 rgba(255,255,255,.4)}
</style>
</head><body>
<div class="sw">
  <div class="chip" style="background-image:var(--finish-holo)"><span class="name">Holographic</span></div>
  <div class="chip" style="background-image:var(--finish-foil)"><span class="name">Gold Foil</span></div>
  <div class="chip" style="background-image:var(--finish-coin)"><span class="name">Silver Coin</span></div>
</div>
</body></html>
