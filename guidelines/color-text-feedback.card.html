<!-- @dsCard group="Colors" viewport="700x150" name="Text & Feedback" subtitle="Text hierarchy + status colors" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>body{padding:22px 24px;margin:0}.row{display:flex;gap:30px;flex-wrap:wrap;align-items:center}.dot{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-ui);font-size:13px}.d{width:14px;height:14px;border-radius:50%}</style>
</head><body>
<div class="row" style="margin-bottom:16px">
  <span style="font-family:var(--font-ui);font-weight:600;color:var(--text-strong)">Strong</span>
  <span style="font-family:var(--font-ui);color:var(--text-body)">Body</span>
  <span style="font-family:var(--font-ui);color:var(--text-muted)">Muted</span>
  <span style="font-family:var(--font-ui);color:var(--text-faint)">Faint</span>
</div>
<div class="row">
  <span class="dot"><span class="d" style="background:var(--success)"></span>Success</span>
  <span class="dot"><span class="d" style="background:var(--warning)"></span>Warning</span>
  <span class="dot"><span class="d" style="background:var(--danger)"></span>Danger</span>
  <span class="dot"><span class="d" style="background:var(--info)"></span>Info</span>
</div>
</body></html>
