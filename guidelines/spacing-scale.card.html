<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base · sp-1 → sp-16" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>body{padding:24px;margin:0}.row{display:flex;gap:14px;align-items:flex-end}.col{display:flex;flex-direction:column;align-items:center;gap:6px}.bar{background:linear-gradient(180deg,var(--ibm-blue-hover),var(--ibm-blue));border-radius:3px}.lab{font-family:var(--font-mono);font-size:10px;color:var(--text-faint)}</style>
</head><body>
<div class="row">
  <div class="col"><div class="bar" style="width:4px;height:4px"></div><span class="lab">1·4</span></div>
  <div class="col"><div class="bar" style="width:8px;height:8px"></div><span class="lab">2·8</span></div>
  <div class="col"><div class="bar" style="width:12px;height:12px"></div><span class="lab">3·12</span></div>
  <div class="col"><div class="bar" style="width:16px;height:16px"></div><span class="lab">4·16</span></div>
  <div class="col"><div class="bar" style="width:24px;height:24px"></div><span class="lab">6·24</span></div>
  <div class="col"><div class="bar" style="width:32px;height:32px"></div><span class="lab">8·32</span></div>
  <div class="col"><div class="bar" style="width:48px;height:48px"></div><span class="lab">12·48</span></div>
  <div class="col"><div class="bar" style="width:64px;height:64px"></div><span class="lab">16·64</span></div>
</div>
</body></html>
