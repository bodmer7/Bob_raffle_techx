<!-- @dsCard group="Colors" viewport="700x180" name="Brand — IBM Blue" subtitle="The one true accent: #0f62fe + code cyan" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{padding:22px 24px;margin:0}
  .sw{display:flex;gap:14px;flex-wrap:wrap}
  .chip{width:150px;height:96px;border-radius:var(--r-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-shadow:var(--inset-line)}
  .name{font-family:var(--font-ui);font-weight:600;font-size:12px;color:#fff}
  .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.8)}
</style>
</head><body>
<div class="sw">
  <div class="chip" style="background:var(--ibm-blue)"><span class="name">IBM Blue</span><span class="hex">#0f62fe</span></div>
  <div class="chip" style="background:var(--ibm-blue-hover)"><span class="name">Hover</span><span class="hex">#2f7bff</span></div>
  <div class="chip" style="background:var(--ibm-blue-press)"><span class="name">Press</span><span class="hex">#0a4fd1</span></div>
  <div class="chip" style="background:var(--code-cyan)"><span class="name" style="color:#06243f">Code Cyan</span><span class="hex" style="color:#06243f">#54c8ff</span></div>
</div>
</body></html>
