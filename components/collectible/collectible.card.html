<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { padding: 24px; }
  .sec { font-family: var(--font-ui); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .16em; color: var(--text-faint); margin: 0 0 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .cards { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { RarityBadge, StickerCard, Capsule } = window.IBMBobCapsuleDesignSystem_7e639d;
  const S = '../../assets/stickers/';
  function Demo() {
    return (
      <div>
        <p className="sec">Rarity ladder · blue → purple → pink → red → gold</p>
        <div className="row" style={{ marginBottom: 28 }}>
          <RarityBadge tier="standard" />
          <RarityBadge tier="rare" />
          <RarityBadge tier="epic" />
          <RarityBadge tier="legendary" />
          <RarityBadge tier="exotic" />
          <span style={{ width: 18 }} />
          <RarityBadge tier="epic" variant="soft" />
          <RarityBadge tier="legendary" variant="bar" label="Legendary Drop" />
        </div>

        <p className="sec">Sticker cards</p>
        <div className="cards" style={{ marginBottom: 28 }}>
          <StickerCard name="Code With Bob" image={S+'code-with-bob.png'} tier="standard" width={180} />
          <StickerCard name="Innovate With Bob" image={S+'innovate-with-bob.png'} tier="epic" width={180} count={3} />
          <StickerCard name="Hotfix Hero" image={S+'hotfix-hero.png'} tier="legendary" width={180} isNew />
          <StickerCard name="MVP Programmer" image={S+'mvp-programmer.png'} tier="exotic" finish="holo" width={180} />
          <StickerCard locked tier="rare" width={180} />
        </div>

        <p className="sec">Capsule</p>
        <Capsule name="Legendary Capsule" series="Series 02" hint="legendary" size={180} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
